name: Build Aqim APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Print notification_service.dart
        run: |
          echo "===== notification_service.dart ====="
          nl -ba lib/services/notification_service.dart | sed -n '35,55p'

      - name: Show notification imports
        run: |
          echo "===== Imports ====="
          sed -n '1,60p' lib/services/notification_service.dart

      - name: Show flutter_local_notifications version
        run: |
          echo "===== pubspec.lock ====="
          grep -A8 "flutter_local_notifications:" pubspec.lock || true

      - name: Show dependency tree
        run: |
          flutter pub deps | grep -A10 flutter_local_notifications || true

      - name: Locate notification plugin
        run: |
          find ~/.pub-cache/hosted/pub.dev -name flutter_local_notifications_plugin.dart

      - name: Show initialize signature
        run: |
          grep -n "Future<bool.*initialize" -R ~/.pub-cache/hosted/pub.dev/flutter_local_notifications-21.0.0/lib || true
          grep -n "initialize(" -R ~/.pub-cache/hosted/pub.dev/flutter_local_notifications-21.0.0/lib | head -20

      - name: Search for duplicate FlutterLocalNotificationsPlugin
        run: |
          echo "===== Duplicate class search ====="
          grep -R "class FlutterLocalNotificationsPlugin" . || true
          grep -R "typedef FlutterLocalNotificationsPlugin" . || true
          grep -R "extension FlutterLocalNotificationsPlugin" . || true

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aqim-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
