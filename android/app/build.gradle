plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0.0"

// توقيع الإصدار الحقيقي: يُقرَأ من android/key.properties محليًا (ملف
// غير موجود فـ git، أنشئه بنفسك)، أو من متغيرات البيئة فـ GitHub Actions
// (KEYSTORE_PATH, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD). إن لم يتوفّر
// أي منهما، يُستعمل توقيع debug تلقائيًا (كي لا يفشل البناء أبدًا) —
// راجع README لخطوات الإعداد الكاملة.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}

def releaseStoreFile = keystoreProperties['storeFile'] ?: System.getenv("KEYSTORE_PATH")
def releaseStorePassword = keystoreProperties['storePassword'] ?: System.getenv("KEYSTORE_PASSWORD")
def releaseKeyAlias = keystoreProperties['keyAlias'] ?: System.getenv("KEY_ALIAS")
def releaseKeyPassword = keystoreProperties['keyPassword'] ?: System.getenv("KEY_PASSWORD")
def hasReleaseSigning = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

android {
    namespace "com.comptaflow.aqim"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        // مطلوب من مكتبة flutter_local_notifications (تستعمل واجهات Java 8+ داخليًا).
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.comptaflow.aqim"
        minSdk 23
        targetSdk 36
        multiDexEnabled true
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile rootProject.file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            // يوقّع بمفتاح الإصدار الحقيقي إن توفّر، وإلا يرجع تلقائيًا
            // لمفتاح debug (بناء قابل للتجريب دائمًا، غير صالح للنشر).
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

flutter {
    source "../.."
}
