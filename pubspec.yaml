name: aqim
description: "أقم — مدرب شخصي لبناء عادة الصلاة"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  provider: ^6.1.5
  shared_preferences: ^2.5.5
  google_fonts: ^6.3.3

  # Required by Flutter 3.41.9
  intl: ^0.20.2

  audioplayers: ^6.7.1
  google_mobile_ads: ^5.3.1
  http: ^1.6.0

  geolocator: ^13.0.4

  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.1
  flutter_timezone: ^4.1.1

  disable_battery_optimization: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/before/
    - assets/audio/after/
