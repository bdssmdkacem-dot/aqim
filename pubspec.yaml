name: aqim
description: "أقم — مدرب شخصي لبناء عادة الصلاة"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  audioplayers: ^6.0.0
  google_mobile_ads: ^5.1.0
  http: ^1.2.2
  geolocator: ^13.0.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.9.4
  flutter_timezone: ^2.1.0
  disable_battery_optimization: ^1.1.2

dev_dependencies:
  flutter:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/before/
    - assets/audio/after/
