name: Build Aqim APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Show Flutter Version
        run: flutter --version

      - name: Show pubspec.yaml
        run: cat pubspec.yaml

      - name: Install Dependencies
        run: flutter pub get

      - name: Show pubspec.lock
        run: cat pubspec.lock

      - name: Show Notification Packages
        run: |
          echo "===== flutter_local_notifications ====="
          grep -A5 "flutter_local_notifications:" pubspec.lock || true

          echo "===== flutter_timezone ====="
          grep -A5 "flutter_timezone:" pubspec.lock || true

          echo "===== timezone ====="
          grep -A5 "timezone:" pubspec.lock || true

      - name: Show notification_service.dart
        run: |
          echo "===== notification_service.dart ====="
          nl -ba lib/services/notification_service.dart | sed -n '1,220p'

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aqim-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
