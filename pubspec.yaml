name: aqim
description: "أقم — مدرب شخصي لبناء عادة الصلاة"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  provider: ^6.1.2
  shared_preferences: ^2.5.5
  google_fonts: ^6.3.3
  intl: ^0.20.2
  audioplayers: ^6.7.1
  google_mobile_ads: ^5.3.1
  http: ^1.6.0
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/before/
    - assets/audio/after/
